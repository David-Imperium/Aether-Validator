name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Windows
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            archive: zip
          # Linux
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar
          # macOS
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar

    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Install cross-compilation tools (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-
      
      - name: Build
        run: cargo build --release -p aether-mcp --target ${{ matrix.target }}
      
      - name: Prepare binary (Windows)
        if: matrix.archive == 'zip'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../aether-mcp-server-${{ matrix.target }}.zip aether-mcp-server.exe
      
      - name: Prepare binary (Unix)
        if: matrix.archive == 'tar'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../aether-mcp-server-${{ matrix.target }}.tar.gz aether-mcp-server
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aether-mcp-server-${{ matrix.target }}
          path: |
            aether-mcp-server-${{ matrix.target }}.*

  contracts:
    name: Package Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Package contracts
        run: tar -czf contracts.tar.gz -C . contracts
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: contracts
          path: contracts.tar.gz

  release:
    name: Create Release
    needs: [build, contracts]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Aether MCP Server ${{ steps.version.outputs.version }}
          body: |
            ## Aether MCP Server - Universal AI Validation Layer
            
            ### Installation
            
            **Windows (PowerShell):**
            ```powershell
            irm https://raw.githubusercontent.com/${{ github.repository }}/main/install.ps1 | iex
            ```
            
            **Linux/macOS:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
            ```
            
            **Manual installation:**
            Download the binary for your platform and add to your MCP configuration.
            
            ### Available Tools
            
            - `aether_validate` - Validate code against contracts
            - `aether_certify` - Generate cryptographic certificate
            - `aether_analyze` - Analyze code structure and AST
            
            ### Supported Languages
            
            Rust, C++, Lex, Python, JavaScript, TypeScript, Go, Java
            
          files: |
            artifacts/*/aether-mcp-server-*
            artifacts/contracts/contracts.tar.gz
            install.ps1
            install.sh
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-alpha') || contains(steps.version.outputs.version, '-beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
