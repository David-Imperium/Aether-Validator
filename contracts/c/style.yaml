contracts:
  - id: C_STYLE001
    name: "Magic Numbers"
    domain: style
    severity: info
    description: "Hardcoded numeric constants without explanation"
    tags:
      - c
      - style
      - magic-numbers
    rules:
      - pattern: '\b[0-9]{2,}\b[^x0-9]'
        message: "Magic number detected - consider named constant"
        suggestion: "Define: #define MAX_BUFFER_SIZE 4096"
      - pattern: '\b0x[0-9A-Fa-f]{3,}\b'
        message: "Hex magic number - add comment or define"
        suggestion: "Use named constant: #define FLAGS_MASK 0xFF00"

  - id: C_STYLE002
    name: "Deeply Nested Conditionals"
    domain: style
    severity: warning
    description: "More than 3 levels of nesting reduces readability"
    tags:
      - c
      - style
      - complexity
    rules:
      - pattern: 'if\s*\([^)]*\)[^}]*if\s*\([^)]*\)[^}]*if\s*\([^)]*\)[^}]*if'
        message: "Deep nesting detected - consider refactoring"
        suggestion: "Use early returns, guard clauses, or extract functions"

  - id: C_STYLE003
    name: "Long Function"
    domain: style
    severity: warning
    description: "Function exceeds reasonable length"
    tags:
      - c
      - style
      - complexity
    rules:
      - pattern: '\w+\s+\w+\s*\([^)]*\)\s*\{[^}]{500,}'
        message: "Function may be too long - consider splitting"
        suggestion: "Break into smaller functions with single responsibility"

  - id: C_STYLE004
    name: "Missing Function Declaration"
    domain: style
    severity: info
    description: "Function used without prior declaration"
    tags:
      - c
      - style
      - declarations
    rules:
      - pattern: '\w+\s+\w+\s*\([^)]*\)\s*\{'
        message: "Ensure function is declared in header or before use"
        suggestion: "Add prototype in header file for public functions"

  - id: C_STYLE005
    name: "Inconsistent Naming"
    domain: style
    severity: info
    description: "Mixed naming conventions in same scope"
    tags:
      - c
      - style
      - naming
    rules:
      - pattern: '\b[a-z][a-z0-9_]*\s+[A-Z][A-Za-z0-9]*\s*='
        message: "Mixed snake_case and camelCase"
        suggestion: "Use consistent naming: snake_case for C"

  - id: C_STYLE006
    name: "Global Variable"
    domain: style
    severity: warning
    description: "Global variables make code harder to test and reason about"
    tags:
      - c
      - style
      - globals
    rules:
      - pattern: '^[^#]*\w+\s+\w+\s*=\s*[^;]+;'
        message: "Global variable at file scope"
        suggestion: "Pass as parameter or use static with accessor functions"

  - id: C_STYLE007
    name: "Missing Include Guards"
    domain: style
    severity: warning
    description: "Header file without include guards"
    tags:
      - c
      - style
      - headers
    rules:
      - pattern: '#include.*\n#ifndef'
        message: "Check header has include guards"
        suggestion: "Use: #ifndef HEADER_H / #define HEADER_H / ... / #endif"

  - id: C_STYLE008
    name: "Commented Out Code"
    domain: style
    severity: info
    description: "Dead code should be removed, not commented"
    tags:
      - c
      - style
      - dead-code
    rules:
      - pattern: '//\s*(if|for|while|return|printf)\s*\('
        message: "Commented out code detected"
        suggestion: "Remove dead code - use version control for history"
      - pattern: '/\*.*\b(if|for|while)\b.*\*/'
        message: "Commented out code block"
        suggestion: "Delete commented code - git preserves history"

  - id: C_STYLE009
    name: "Complex Ternary"
    domain: style
    severity: info
    description: "Nested ternary operators are hard to read"
    tags:
      - c
      - style
      - readability
    rules:
      - pattern: '\?[^:]*\?[^:]*:'
        message: "Nested ternary operator"
        suggestion: "Use if-else for clarity"
