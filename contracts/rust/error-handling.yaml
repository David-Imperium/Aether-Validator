# Rust Error Handling Contracts
# Domain: error-handling

contracts:
  - id: RUST006
    name: "No expect without context"
    domain: error-handling
    severity: warning
    description: "expect() should always include a context message explaining why we expect success"
    tags:
      - rust
      - error-handling
    rules:
      - pattern: ".expect(\"\")"
        message: "expect() called with empty message"
        suggestion: "Provide a descriptive message: .expect(\"why this should succeed\")"

  - id: RUST007
    name: "Prefer anyhow for errors"
    domain: error-handling
    severity: info
    description: "Use anyhow for error propagation in applications"
    tags:
      - rust
      - error-handling
    rules:
      - pattern: "Box<dyn std::error::Error>"
        message: "Box<dyn Error> is verbose"
        suggestion: "Use anyhow::Result for application error handling"

  - id: RUST008
    name: "No panic in lib"
    domain: error-handling
    severity: error
    description: "Library code should never panic, use Result instead"
    tags:
      - rust
      - error-handling
      - library
    rules:
      - pattern: "panic!(\""
        message: "panic! in library code"
        suggestion: "Return Result and let the caller decide how to handle errors"

  - id: RUST009
    name: "Document public errors"
    domain: error-handling
    severity: info
    description: "Public functions returning Result should document their errors"
    tags:
      - rust
      - documentation
    rules:
      - pattern: "# Errors\n"
        message: "Error documentation found"
        suggestion: "Continue documenting what errors can be returned and why"

  # === BLIND SPOTS FOUND BY EXTERNAL AUDIT ===

  - id: RUST040
    name: "Float NaN comparison unsafe"
    domain: error-handling
    severity: warning
    description: "partial_cmp() returns Option because NaN comparisons are undefined. unwrap() will panic if either value is NaN"
    tags:
      - rust
      - error-handling
      - float
      - panic
    rules:
      - pattern: ".partial_cmp("
        message: "partial_cmp() returns Option - handle None case for NaN values"
        suggestion: "Use .unwrap_or(std::cmp::Ordering::Equal) or match on None"

  - id: RUST041
    name: "Empty collection access"
    domain: error-handling
    severity: warning
    description: "Calling unwrap() on first()/last() will panic if the collection is empty"
    tags:
      - rust
      - error-handling
      - collections
      - panic
    rules:
      - pattern: 'first\(\)\.unwrap\(\)'
        message: ".first().unwrap() panics on empty collection"
        suggestion: "Use .first().copied().unwrap_or_default() or check .is_empty()"
      - pattern: 'last\(\)\.unwrap\(\)'
        message: ".last().unwrap() panics on empty collection"
        suggestion: "Use .last().copied().unwrap_or_default() or check .is_empty()"

  - id: RUST042
    name: "HashMap/BTreeMap unchecked access"
    domain: error-handling
    severity: warning
    description: "Calling unwrap() on map.get() will panic if the key is not present"
    tags:
      - rust
      - error-handling
      - collections
      - panic
    rules:
      - pattern: ".get("
        message: "map.get() returns Option - handle None case when key is missing"
        suggestion: "Use .get(k).copied().unwrap_or(default) or .expect(\"key must exist\")"
